name: ClusterFuzzLite Batch

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Monday 06:00 UTC

permissions: read-all

jobs:
  fuzz:
    name: Fuzz (Batch)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Build fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c # v1
        with:
          language: go
          sanitizer: address

      - name: Run fuzzers
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c # v1
        with:
          mode: batch
          fuzz-seconds: 3600
          output-sarif: true

      - name: Upload SARIF
        if: always() && steps.run.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v3
        with:
          sarif_file: cifuzz-sarif/results.sarif
          checkout_path: ${{ github.workspace }}

  prune:
    name: Prune Corpus
    runs-on: ubuntu-latest
    needs: fuzz
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Build fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c # v1
        with:
          language: go
          sanitizer: address

      - name: Prune corpus
        uses: google/clusterfuzzlite/actions/run_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c # v1
        with:
          mode: prune
          fuzz-seconds: 60

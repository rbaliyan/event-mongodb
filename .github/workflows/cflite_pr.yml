name: ClusterFuzzLite PR

on:
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  fuzz:
    name: Fuzz (code-change)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c # v1
        with:
          language: go
          sanitizer: address

      - name: Run fuzzers
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c # v1
        with:
          language: go
          # Only fuzz code changed in the PR, with a short budget.
          mode: code-change
          sanitizer: address
          fuzz-seconds: 300
          output-sarif: true

      - name: Upload SARIF
        if: always() && steps.run.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          sarif_file: cifuzz-sarif/results.sarif
          checkout_path: ${{ github.workspace }}

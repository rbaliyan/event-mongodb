name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  smoke:
    name: Smoke (fast, no MongoDB)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -v ./...

      - name: Build examples
        run: go build -o /dev/null ./examples/

      - name: Smoke tests (short, hermetic)
        run: go test -short -count=1 ./...

      - name: Runnable examples
        run: go test -short -run Example ./...

  test:
    name: Unit Tests (race)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Unit tests
        run: go test -short -race -count=1 ./...

  integration:
    name: Integration Tests (MongoDB)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Start MongoDB replica set
        run: |
          docker run -d --name mongo -p 27018:27017 mongo:6.0 --replSet rs0
          # Wait for mongod to accept connections, then initiate the replica set.
          for i in $(seq 1 30); do
            if docker exec mongo mongosh --quiet --eval "db.adminCommand('ping').ok" | grep -q 1; then
              break
            fi
            sleep 1
          done
          docker exec mongo mongosh --quiet --eval "rs.initiate()"
          # Wait until the node is primary (writable) before running tests.
          for i in $(seq 1 30); do
            if docker exec mongo mongosh --quiet --eval "db.hello().isWritablePrimary" | grep -q true; then
              break
            fi
            sleep 1
          done

      - name: Integration + unit tests with coverage
        env:
          MONGO_URI: mongodb://localhost:27018/?directConnection=true
        run: |
          # Cover the library packages only. The examples/ demo main and the
          # test-only internal/mongotest helper carry no meaningful coverage and
          # would otherwise dominate the denominator.
          PKGS=$(go list ./... | grep -vE '/(examples|internal/mongotest)$')
          go test -race -count=1 -coverprofile=coverage.out -covermode=atomic $PKGS

      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | tail -1 | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Enforce coverage floor
        run: |
          # Floor with headroom below the current ~76% library coverage; ratchet
          # upward as coverage improves (the Coverage summary prints the total).
          THRESHOLD=70.0
          TOTAL=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          echo "Total coverage: ${TOTAL}% (floor: ${THRESHOLD}%)"
          awk -v t="$THRESHOLD" -v c="$TOTAL" 'BEGIN { exit (c+0 >= t+0) ? 0 : 1 }' \
            || { echo "Coverage ${TOTAL}% is below floor ${THRESHOLD}%"; exit 1; }

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks (HEAD)
        run: go test -run='^$' -bench=. -benchmem -count=10 ./... | tee new.txt

      - name: Capture CPU and memory profiles (hot paths)
        run: |
          mkdir -p profiles
          # Profile the root package, which holds the per-event hot paths.
          go test -run='^$' -bench=. -benchmem -count=6 \
            -cpuprofile=profiles/cpu.out -memprofile=profiles/mem.out . > /dev/null
          {
            echo '## CPU profile (top)'
            echo '```'
            go tool pprof -top -nodecount=15 profiles/cpu.out 2>/dev/null || true
            echo '```'
            echo '## Allocations (top)'
            echo '```'
            go tool pprof -top -sample_index=alloc_space -nodecount=15 profiles/mem.out 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload profiles
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-profiles
          path: profiles/

      - name: Run benchmarks (base) and compare
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git worktree add /tmp/base "$BASE_SHA"
          ( cd /tmp/base && go test -run='^$' -bench=. -benchmem -count=6 ./... > "$GITHUB_WORKSPACE/old.txt" 2>/dev/null ) || true
          {
            echo '## Benchmark comparison (base vs HEAD)'
            echo '```'
            if [ -s old.txt ]; then
              benchstat old.txt new.txt || true
            else
              echo 'No comparable base benchmarks; showing HEAD results:'
              benchstat new.txt || true
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.11.4
          args: --tests=false

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v3
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v3
        with:
          category: "/language:go"
